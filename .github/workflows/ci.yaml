name: Flutter CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main ]
    tags: [ 'rc-*', 'v*' ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '30 4 * * *'
  workflow_dispatch:

jobs:
  flutter-tier0:
    name: Flutter Tier 0 (Blocking)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Run Tier 0 release gates
        run: bash tools/run_release_gate.sh tier0

  flutter-tier1:
    name: Flutter Tier 1 (Blocking)
    runs-on: ubuntu-latest
    needs: flutter-tier0
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Run Tier 1 release gates
        run: bash tools/run_release_gate.sh tier1

  flutter-tier2:
    name: Flutter Tier 2 (Soft Gate)
    runs-on: ubuntu-latest
    needs: flutter-tier1
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Run Tier 2 release gates
        run: bash tools/run_release_gate.sh tier2

      - name: Build web release (informational)
        run: flutter build web --release --base-href "/"

      - name: Tier 2 completion notice
        run: echo "Tier 2 is a soft gate. Review warnings before release."

  functions:
    name: Lint & Test (Cloud Functions)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  functions-rules:
    name: Firestore Rules Verification
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Set up Java 21 (Firestore emulator requirement)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install dependencies
        run: npm ci

      - name: Firestore contract drift gate
        shell: pwsh
        run: ../tools/firestore_contract_ci.ps1

      - name: Run Firestore rules tests
        run: npm run test:rules

  launch-load-gate:
    name: Launch Load Gate (PR/Push)
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Install function dependencies
        run: npm --prefix functions ci

      - name: Run launch load harness (blocking profile)
        shell: pwsh
        run: ./tools/run_launch_load_harness.ps1 -Cycles 1 -PressureRepeatsPerCycle 0 -ValidationMode enforce

      - name: Upload launch load artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: launch-load-gate-${{ github.run_id }}
          path: tools/reports/launch_load_harness_*.json
          if-no-files-found: warn

  launch-load-nightly:
    name: Launch Load Gate (Nightly)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Set up Java 21 (for optional rules validation)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Install function dependencies
        run: npm --prefix functions ci

      - name: Run launch load harness (nightly pressure profile)
        shell: pwsh
        run: ./tools/run_launch_load_harness.ps1 -Cycles 3 -PressureRepeatsPerCycle 1 -Shuffle -IncludeRulesValidation -ValidationMode enforce

      - name: Upload nightly launch load artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: launch-load-nightly-${{ github.run_id }}
          path: |
            tools/reports/launch_load_harness_*.json
            tools/reports/launch_load_harness_*.md
          if-no-files-found: warn

  rc-burnin-tier0:
    name: RC Burn-In Tier 0
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Run Tier 0 burn-in
        shell: pwsh
        run: ./tools/run_tier0_burn_in.ps1 -Cycles 5 -PressureRepeatsPerCycle 2 -Shuffle

      - name: Upload Tier 0 burn-in report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tier0-burnin-report
          path: tools/reports/tier0_burn_in_*.json
          if-no-files-found: error

  rc-burnin-tier1:
    name: RC Burn-In Tier 1
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: rc-burnin-tier0
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Run Tier 1 burn-in
        shell: pwsh
        run: ./tools/run_tier1_burn_in.ps1 -Cycles 5 -PressureRepeatsPerCycle 2 -Shuffle

      - name: Upload Tier 1 burn-in report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tier1-burnin-report
          path: tools/reports/tier1_burn_in_*.json
          if-no-files-found: error

  rc-release-verdict:
    name: RC Release Verdict
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: [rc-burnin-tier0, rc-burnin-tier1]
    steps:
      - uses: actions/checkout@v4

      - name: Download Tier 0 burn-in artifact
        uses: actions/download-artifact@v4
        with:
          name: tier0-burnin-report
          path: tools/reports

      - name: Download Tier 1 burn-in artifact
        uses: actions/download-artifact@v4
        with:
          name: tier1-burnin-report
          path: tools/reports

      - name: Restore verdict history cache
        uses: actions/cache/restore@v4
        with:
          path: tools/reports/history
          key: rc-verdict-history-${{ github.run_id }}
          restore-keys: |
            rc-verdict-history-

      - name: Build formal release verdict
        shell: pwsh
        run: ./tools/build_release_verdict.ps1 -ReportsDir tools/reports -OutputPath tools/reports/release_candidate_verdict.json -MarkdownOutputPath tools/reports/release_candidate_verdict.md -HistoryDir tools/reports/history -HistoryIndexPath tools/reports/history/verdict_index.json

      - name: Build confidence drift dashboard
        shell: pwsh
        run: ./tools/build_confidence_drift_dashboard.ps1 -ReportsDir tools/reports -HistoryDir tools/reports/history -PreferHistory -VerdictPattern release_candidate_verdict*.json -OutputJson tools/reports/confidence_drift_dashboard.json -OutputMarkdown tools/reports/confidence_drift_dashboard.md

      - name: Evaluate release governor policy
        shell: pwsh
        run: ./tools/evaluate_release_governor.ps1 -DashboardPath tools/reports/confidence_drift_dashboard.json -PolicyPath tools/release_governor_policy.json -OutputJson tools/reports/release_governor_decision.json -OutputMarkdown tools/reports/release_governor_decision.md

      - name: Build policy tuner snapshot (recommend-only)
        continue-on-error: true
        shell: pwsh
        run: ./tools/build_policy_tuner_snapshot.ps1 -ContractVersion 1.0.0 -DashboardPath tools/reports/confidence_drift_dashboard.json -GovernorDecisionPath tools/reports/release_governor_decision.json -ActivePolicyPath tools/release_governor_policy.json -SafetyFloorsPath tools/release_governor_safety_floors.json -WindowSize 10 -BaselineWindowSize 30 -BurnInRcCount 6 -DivergenceThreshold 8 -EarlyExitOnSevereInstability $true -ShortWeight 0.4 -BaselineWeight 0.6 -OutputProposedPath tools/reports/proposed_thresholds.json -OutputSnapshotPath tools/reports/rc_policy_snapshot_v1.json -OutputApprovalRequestPath tools/reports/policy_approval_request.json -OutputStatusPath tools/reports/policy_tuner_status.json -OutputHistoryIndexPath tools/reports/policy_history_index.json

      - name: Emit tuner fallback artifacts
        if: always()
        shell: pwsh
        run: |
          if (-not (Test-Path 'tools/reports/proposed_thresholds.json')) {
            @{
              contract_version = '1.0.0'
              artifact_mode = 'fallback'
              generatedAtUtc = (Get-Date).ToUniversalTime().ToString('o')
              modelVersion = 'policy_tuner_v1'
              mode = 'recommend-only'
              recommendationType = 'hold'
              recommendationState = 'hold'
              policy_divergence_score = 0
              divergence_classification = 'transient'
              policy_stability_score = 0
              currentThresholds = @{}
              recommendedThresholds = @{}
              delta = @{}
              justificationSignals = @{
                failureMode = 'tuner_failed'
              }
            } | ConvertTo-Json -Depth 20 | Out-File -FilePath 'tools/reports/proposed_thresholds.json' -Encoding utf8
          }
          if (-not (Test-Path 'tools/reports/rc_policy_snapshot_v1.json')) {
            @{
              contract_version = '1.0.0'
              artifact_mode = 'fallback'
              generatedAtUtc = (Get-Date).ToUniversalTime().ToString('o')
              snapshotVersion = 'rc_policy_snapshot_v1'
              mode = 'recommend-only'
              currentPolicy = @{}
              proposedPolicy = @{
                recommendationType = 'hold'
                recommendationState = 'hold'
                policy_stability_score = 0
              }
            } | ConvertTo-Json -Depth 20 | Out-File -FilePath 'tools/reports/rc_policy_snapshot_v1.json' -Encoding utf8
          }
          if (-not (Test-Path 'tools/reports/policy_approval_request.json')) {
            @{
              contract_version = '1.0.0'
              artifact_mode = 'fallback'
              generatedAtUtc = (Get-Date).ToUniversalTime().ToString('o')
              requestVersion = 'policy_approval_request_v1'
              status = 'pending_manual_approval'
              mode = 'recommend-only'
              recommendationType = 'hold'
              recommendationState = 'hold'
              policy_stability_score = 0
              approvalRequired = $true
            } | ConvertTo-Json -Depth 20 | Out-File -FilePath 'tools/reports/policy_approval_request.json' -Encoding utf8
          }
          if (-not (Test-Path 'tools/reports/policy_tuner_status.json')) {
            @{
              contract_version = '1.0.0'
              artifact_mode = 'fallback'
              generatedAtUtc = (Get-Date).ToUniversalTime().ToString('o')
              statusVersion = 'policy_tuner_status_v1'
              status = 'tuner_failed'
              reason = 'script_error'
              policyAction = 'hold'
              mode = 'recommend-only'
              recommendationType = 'hold'
              recommendationState = 'hold'
              policy_divergence_score = 0
              divergence_classification = 'transient'
              policy_stability_score = 0
              outputs = @{}
            } | ConvertTo-Json -Depth 10 | Out-File -FilePath 'tools/reports/policy_tuner_status.json' -Encoding utf8
          }
          if (-not (Test-Path 'tools/reports/policy_history_index.json')) {
            @{
              contract_version = '1.0.0'
              artifact_mode = 'fallback'
              indexVersion = 'policy_history_index_v1'
              entries = @()
            } | ConvertTo-Json -Depth 20 | Out-File -FilePath 'tools/reports/policy_history_index.json' -Encoding utf8
          }

      - name: Validate policy drift contract
        continue-on-error: true
        shell: pwsh
        run: ./tools/validate_policy_drift_contract.ps1 -ValidationMode observe -ContractPath tools/policy_drift_contract.schema.json -ProposedPath tools/reports/proposed_thresholds.json -SnapshotPath tools/reports/rc_policy_snapshot_v1.json -ApprovalRequestPath tools/reports/policy_approval_request.json -StatusPath tools/reports/policy_tuner_status.json -OutputValidationStatusPath tools/reports/policy_contract_validation_status.json

      - name: Replay governance timeline (observe)
        continue-on-error: true
        shell: pwsh
        run: ./tools/replay_governance_timeline.ps1 -IndexPath tools/reports/history/verdict_index.json -SweepBurnInFrom 1 -SweepBurnInTo 10 -OutputPath tools/reports/replay_timeline.json

      - name: Analyze policy boundary drift (observe)
        continue-on-error: true
        shell: pwsh
        run: ./tools/analyze_policy_boundary_drift.ps1 -IndexPath tools/reports/history/verdict_index.json -SweepBurnInFrom 1 -SweepBurnInTo 10 -OutputPath tools/reports/boundary_drift_analysis.json

      - name: Compare policy surfaces (observe)
        continue-on-error: true
        shell: pwsh
        run: ./tools/compare_policy_surfaces.ps1 -IndexPathA tools/reports/history/verdict_index.json -IndexPathB tools/reports/history/verdict_index.json -LabelA current -LabelB current -SweepBurnInFrom 1 -SweepBurnInTo 10 -OutputPath tools/reports/policy_surface_diff.json

      - name: Compute policy drift score (observe)
        continue-on-error: true
        shell: pwsh
        run: ./tools/compute_policy_drift_score.ps1 -ReplayPath tools/reports/replay_timeline.json -BoundaryDriftPath tools/reports/boundary_drift_analysis.json -PolicySurfaceDiffPath tools/reports/policy_surface_diff.json -OutputPath tools/reports/policy_drift_score.json -DriftScoreThreshold 45

      - name: Build policy analysis snapshot (observe)
        continue-on-error: true
        shell: pwsh
        run: ./tools/build_policy_analysis_snapshot.ps1 -PolicyDriftScorePath tools/reports/policy_drift_score.json -PolicySurfaceDiffPath tools/reports/policy_surface_diff.json -BoundaryDriftPath tools/reports/boundary_drift_analysis.json -HistoryDir tools/reports/history -SnapshotIndexPath tools/reports/history/policy_analysis_snapshot_index.json

      - name: Compute policy analysis delta (observe)
        continue-on-error: true
        shell: pwsh
        run: ./tools/compute_policy_analysis_delta.ps1 -HistoryDir tools/reports/history -SnapshotIndexPath tools/reports/history/policy_analysis_snapshot_index.json -OutputPath tools/reports/policy_analysis_delta.json

      - name: Validate policy analysis contract (observe)
        continue-on-error: true
        shell: pwsh
        run: ./tools/validate_policy_analysis_contract.ps1 -ContractPath tools/policy_analysis_contract.schema.json -ReplayPath tools/reports/replay_timeline.json -BoundaryDriftPath tools/reports/boundary_drift_analysis.json -PolicySurfaceDiffPath tools/reports/policy_surface_diff.json -PolicyDriftScorePath tools/reports/policy_drift_score.json -PolicyAnalysisDeltaPath tools/reports/policy_analysis_delta.json -ValidationMode observe -OutputValidationStatusPath tools/reports/policy_analysis_contract_validation_status.json

      - name: Write policy analysis summary (observe)
        if: always()
        continue-on-error: true
        shell: pwsh
        run: ./tools/write_policy_analysis_summary.ps1 -PolicyDriftScorePath tools/reports/policy_drift_score.json -PolicySurfaceDiffPath tools/reports/policy_surface_diff.json -BoundaryDriftPath tools/reports/boundary_drift_analysis.json -PolicyAnalysisDeltaPath tools/reports/policy_analysis_delta.json -ValidationStatusPath tools/reports/policy_analysis_contract_validation_status.json

      - name: Save verdict history cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: tools/reports/history
          key: rc-verdict-history-${{ github.run_id }}

      - name: Upload release verdict artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rc-release-verdict
          path: |
            tools/reports/release_candidate_verdict.json
            tools/reports/release_candidate_verdict.md
            tools/reports/history/release_candidate_verdict*.json
            tools/reports/history/verdict_index.json
            tools/reports/confidence_drift_dashboard.json
            tools/reports/confidence_drift_dashboard.md
            tools/reports/release_governor_decision.json
            tools/reports/release_governor_decision.md
            tools/reports/proposed_thresholds.json
            tools/reports/rc_policy_snapshot_v1.json
            tools/reports/policy_approval_request.json
            tools/reports/policy_tuner_status.json
            tools/reports/policy_history_index.json
            tools/reports/policy_contract_validation_status.json
            tools/reports/replay_timeline.json
            tools/reports/boundary_drift_analysis.json
            tools/reports/policy_surface_diff.json
            tools/reports/policy_drift_score.json
            tools/reports/policy_analysis_delta.json
            tools/reports/policy_analysis_contract_validation_status.json
            tools/reports/history/policy_analysis_snapshot*.json
            tools/reports/history/policy_analysis_snapshot_index.json
            tools/policy_drift_contract.schema.json
            tools/policy_analysis_contract.schema.json
          if-no-files-found: error

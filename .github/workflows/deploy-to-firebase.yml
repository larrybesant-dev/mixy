name: 🚀 Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.x'
          channel: 'stable'
          cache: true

      - name: 📦 Get dependencies
        run: flutter pub get

      - name: 🔨 Build web app
        run: flutter build web --release --dart-define=FLUTTER_WEB_USE_SKI=false

      - name: 🔑 Setup Firebase CLI
        run: npm install -g firebase-tools

      - name: 🌐 Deploy to Firebase Hosting
        run: firebase deploy --only hosting --token ${{ secrets.FIREBASE_TOKEN }} --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: ✅ Deployment successful
        run: echo "🎉 App deployed to Firebase Hosting!"

      - name: 📊 Post deployment info
        run: |
          echo "Firebase Hosting: https://mixvy.web.app"
          echo "Build artifacts: build/web/"

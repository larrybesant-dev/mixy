name: Deploy to Firebase Hosting

# Least-privilege default: deployment authenticates to Firebase via its own
# service-account secret, not the GITHUB_TOKEN - only repo read access is needed.
permissions:
  contents: read

on:
  # Trigger AFTER stream architecture validation passes
  workflow_run:
    workflows:
      - 'Stream Architecture Enforcement'
    branches:
      - main
    types:
      - completed
  # Also allow manual triggering for immediate deployment if needed
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    
    # Only deploy if stream architecture validation passed
    # (or if manually triggered via workflow_dispatch)
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Web
        # Optimized build flags for production:
        # --release: Production mode for size/performance optimization
        # --no-pub: Skip dependency resolution (already done above, saves time)
        # --base-href "/": Ensure app loads from root path
        run: flutter build web --release --no-pub --base-href "/"

      - name: Deploy to Firebase Hosting
        run: |
          npm install -g firebase-tools@latest
          
          # Export service account as environment variable for authentication
          export GOOGLE_APPLICATION_CREDENTIALS=$(mktemp)
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_MIX_AND_MINGLE_V2 }}' > $GOOGLE_APPLICATION_CREDENTIALS
          
          # Deploy to Firebase Hosting using the repo's configured hosting target
          # (.firebaserc -> target "default" maps to site "mixvy-v2").
          firebase deploy --only hosting --project mix-and-mingle-v2
          
          rm -f $GOOGLE_APPLICATION_CREDENTIALS
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks



name: mixvy
description: "MixVy — Meet. Connect. Vibe. Live audio/video rooms."
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cloud_functions: ^5.0.0
  cupertino_icons: ^1.0.8
  go_router: ^14.0.0
  agora_rtc_engine: 6.5.4
  uuid: ^4.5.1
  image_picker: ^1.1.2
  image: ^4.2.0
  collection: ^1.19.0
  firebase_auth: ^5.2.0
  firebase_database: ^11.0.0
  connectivity_plus: ^6.0.0
  firebase_core: ^3.3.0
  firebase_messaging: ^15.0.0
  firebase_storage: ^12.0.0
  path_provider: ^2.1.3
  cloud_firestore: ^5.2.0
  firebase_analytics: ^11.0.0
  firebase_remote_config: ^5.0.0
  flutter_stripe: ^12.0.0
  flutter_riverpod: 2.5.1
  freezed_annotation: ^3.0.0
  http: ^1.2.2
  flutter_dotenv: ^6.0.1
  share_plus: ^10.0.0
  firebase_crashlytics: ^4.0.0
  url_launcher: ^6.3.0
  shared_preferences: ^2.3.2
  google_sign_in: ^6.2.0
  logging: ^1.3.0
  package_info_plus: ^8.0.0
  path: ^1.9.0
  flutter_webrtc: ^0.12.0
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1
  crypto: ^3.0.3
  rxdart: ^0.28.0
  json_annotation: ^4.9.0
  riverpod: 2.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.9
  freezed: ^3.0.0
  json_serializable: ^6.8.0
  mocktail: ^1.0.0
  fake_cloud_firestore: ^3.0.0
  flutter_launcher_icons: ^0.14.1
  patrol: ^4.3.0
  fake_async: ^1.3.1

  firebase_core_platform_interface: any
flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - assets/emojis/
